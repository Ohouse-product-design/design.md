<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>WITH (Dark) — 상품 상세</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* OHOUSE-DESIGN.md Dark mode tokens */
  :root {
    --bg:#0a0a0a; --bg-weak:#141414; --bg-inverse:#f5f5f5; --bg-brand:#00a1ff; --bg-brand-weak:#01243f;
    --border:#383838; --border-brand:#00a1ff;
    --fg:#f5f5f5; --fg-weak:#acacac; --fg-inverse:#0a0a0a; --fg-brand:#00a1ff;
    --accent-red:#fd3d4a; --accent-yellow:#ffc300;
    --r-sm:4px; --r-md:8px; --r-full:9999px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }
  body { font-family:Pretendard,'Pretendard Variable',sans-serif; letter-spacing:-0.3px; background:#000; word-break:keep-all; color:var(--fg); }
  .frame { max-width:375px; margin:24px auto; background:var(--bg); min-height:90vh; position:relative; padding-bottom:88px; overflow:hidden; border:1px solid var(--border); /* 다크에서 shadow 대신 border */ }
  .topbar { height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 8px; }
  .icon-btn { width:40px; height:40px; border:none; background:transparent; border-radius:var(--r-full); color:var(--fg); cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .icon-btn .icon { width:24px; height:24px; }
  .icon { width:24px; height:24px; fill:currentColor; display:block; }
  .gallery { aspect-ratio:3/4; background:linear-gradient(135deg,#3a342a,#2a2520); display:flex; align-items:center; justify-content:center; position:relative; }
  .gallery::after { content:'1 / 8'; position:absolute; bottom:16px; right:16px; background:#00000099; color:#fff; padding:4px 8px; border-radius:var(--r-full); font-size:11px; line-height:14px; font-weight:500; }
  .sofa { width:75%; height:55%; background:#7d6749; border-radius:12px 12px 24px 24px; }
  .body { padding:16px; }
  .brand-row { margin-bottom:8px; }
  .brand-name { font-size:12px; line-height:16px; font-weight:500; color:var(--fg-weak); }
  .brand-name::after { content:' >'; }
  .title { font-size:18px; line-height:24px; font-weight:600; color:var(--fg); margin-bottom:12px; }
  .reviews { display:flex; align-items:center; gap:4px; font-size:13px; line-height:18px; color:var(--fg-weak); margin-bottom:16px; }
  .star { color:var(--accent-yellow); font-size:14px; }
  .price-row { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
  .discount { font-size:20px; line-height:28px; font-weight:700; color:var(--accent-red); }
  .price { font-size:20px; line-height:28px; font-weight:700; color:var(--fg); }
  .price-unit { font-size:14px; font-weight:500; }
  .original { font-size:13px; line-height:18px; color:var(--fg-weak); text-decoration:line-through; margin-bottom:16px; }
  .divider { height:8px; background:var(--bg-weak); margin:16px -16px; }
  .section-title { font-size:16px; line-height:24px; font-weight:600; color:var(--fg); margin-bottom:12px; }
  .chips { display:flex; gap:8px; }
  .chip { height:32px; padding:0 12px; border:none; border-radius:var(--r-full); font-family:inherit; font-size:13px; line-height:18px; font-weight:500; letter-spacing:-0.3px; background:var(--bg-weak); color:var(--fg); cursor:pointer; }
  .chip.selected { background:var(--bg-brand-weak); color:var(--fg-brand); box-shadow:inset 0 0 0 1px var(--border-brand); }
  .bottombar { position:absolute; bottom:0; left:0; right:0; background:var(--bg); padding:12px 16px; display:flex; gap:8px; border-top:1px solid var(--border); }
  .heart-btn { width:48px; height:48px; border:1px solid var(--border); border-radius:var(--r-md); background:var(--bg); color:var(--fg); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .heart-btn .icon { width:24px; height:24px; }
  .cta { flex:1; height:48px; background:var(--bg-brand); color:var(--fg-inverse); border:none; border-radius:var(--r-md); font-family:inherit; font-size:16px; font-weight:500; line-height:24px; letter-spacing:-0.3px; cursor:pointer; }
  .banner { max-width:375px; margin:0 auto 12px; padding:12px 16px; background:#1a1a1a; color:#fff; font-size:12px; line-height:16px; border-radius:var(--r-md); border:1px solid #333; }
  .banner b { color:var(--accent-yellow); }
</style></head>
