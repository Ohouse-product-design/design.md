<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>WITHOUT — 회원가입 폼</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f3f4f6; color:#111827; }
  .frame { max-width:375px; margin:24px auto; background:#fff; min-height:90vh; box-shadow:0 1px 3px rgba(0,0,0,.1); position:relative; padding-bottom:80px; overflow:hidden; border-radius:8px; }
  .topbar { height:56px; display:flex; align-items:center; padding:0 16px; border-bottom:1px solid #e5e7eb; }
  .icon-btn { padding:8px; border:none; background:transparent; color:#374151; cursor:pointer; }
  .icon-btn [data-lucide] { width:20px; height:20px; }
  .header-title { flex:1; text-align:center; font-size:18px; font-weight:600; }
  .body { padding:24px 16px 16px; }
  .page-title { font-size:24px; line-height:1.3; font-weight:700; color:#111827; margin-bottom:8px; }
  .page-desc { font-size:14px; line-height:1.6; color:#6b7280; margin-bottom:24px; }
  .field { margin-bottom:16px; }
  .label { display:block; font-size:14px; font-weight:500; color:#374151; margin-bottom:8px; }
  .input { width:100%; height:44px; padding:0 12px; border:1px solid #d1d5db; border-radius:6px; font-family:inherit; font-size:14px; background:#fff; color:#111827; outline:none; }
  .input::placeholder { color:#9ca3af; }
  .input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.2); }
  .input.error { border-color:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.15); }
  .helper { font-size:12px; color:#6b7280; margin-top:6px; }
  .helper.error { color:#ef4444; }
  .checkbox-row { display:flex; align-items:center; gap:8px; margin-top:16px; }
  .checkbox { width:18px; height:18px; border:1px solid #d1d5db; border-radius:4px; background:#3b82f6; display:flex; align-items:center; justify-content:center; color:#fff; }
  .checkbox [data-lucide] { width:14px; height:14px; }
  .checkbox-label { font-size:14px; color:#374151; }
  .bottombar { position:absolute; bottom:0; left:0; right:0; background:#fff; padding:12px 16px; border-top:1px solid #e5e7eb; }
  .cta { width:100%; height:44px; background:#3b82f6; color:#fff; border:none; border-radius:6px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .cta:hover { background:#2563eb; }
  .banner { max-width:375px; margin:0 auto 12px; padding:12px 16px; background:#1f2937; color:#fff; font-size:12px; border-radius:6px; }
  .banner b { color:#fbbf24; }
</style></head>
<body>
<div class="banner"><b>WITHOUT design system</b> — input radius 6 · focus blue 링 / error red 링(영문 helper) · button blue-500 · 일반 Material 톤</div>
<div class="frame">
  <div class="topbar">
    <button class="icon-btn" aria-label="Back"><i data-lucide="chevron-left"></i></button>
    <div class="header-title">Sign Up</div>
    <div style="width:36px"></div>
  </div>
  <div class="body">
    <h1 class="page-title">Create Account</h1>
    <p class="page-desc">Enter your email and password to get started.</p>

    <div class="field">
      <label class="label" for="email">Email</label>
      <input id="email" class="input" type="email" placeholder="you@example.com" value="yohan@bucketplace.net">
    </div>
    <div class="field">
      <label class="label" for="pw">Password</label>
      <input id="pw" class="input" type="password" value="••••••••••">
      <div class="helper">At least 8 characters with letters, numbers, special.</div>
    </div>
    <div class="field">
      <label class="label" for="pw2">Confirm Password</label>
      <input id="pw2" class="input error" type="password" value="••••••">
      <div class="helper error">Passwords don't match.</div>
    </div>
    <div class="checkbox-row">
      <div class="checkbox" role="checkbox" aria-checked="true"><i data-lucide="check"></i></div>
      <label class="checkbox-label">I agree to the Terms of Service and Privacy Policy.</label>
    </div>
  </div>
  <div class="bottombar"><button class="cta">Sign Up</button></div>
</div>
<script src="https://unpkg.com/lucide@0.471.0/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons({attrs:{'stroke-width':2}});</script>
</body></html>
