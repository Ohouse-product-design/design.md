<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>WITHOUT — 결제 실패</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f3f4f6; color:#111827; }
  .frame { max-width:375px; margin:24px auto; background:#fff; min-height:90vh; box-shadow:0 1px 3px rgba(0,0,0,.1); position:relative; padding-bottom:96px; overflow:hidden; border-radius:8px; }
  .topbar { height:56px; display:flex; align-items:center; padding:0 16px; border-bottom:1px solid #e5e7eb; }
  .icon-btn { padding:8px; border:none; background:transparent; color:#374151; cursor:pointer; }
  .icon-btn svg { width:20px; height:20px; }
  .err-wrap { padding:48px 24px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; }
  .err-icon { width:80px; height:80px; color:#ef4444; margin-bottom:16px; }
  .err-icon svg { width:100%; height:100%; }
  .err-title { font-size:20px; line-height:1.4; font-weight:700; color:#dc2626; margin-bottom:8px; }
  .err-desc { font-size:14px; line-height:1.6; color:#6b7280; margin-bottom:24px; }
  .info-card { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:16px; margin:0 16px; }
  .info-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; }
  .info-row .k { color:#6b7280; }
  .info-row .v { color:#111827; font-weight:500; }
  .bottombar { position:absolute; bottom:0; left:0; right:0; background:#fff; padding:12px 16px; border-top:1px solid #e5e7eb; display:flex; gap:8px; }
  .btn-secondary { flex:1; height:44px; background:#fff; color:#374151; border:1px solid #d1d5db; border-radius:6px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-primary { flex:1; height:44px; background:#ef4444; color:#fff; border:none; border-radius:6px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-primary:hover { background:#dc2626; }
  .banner { max-width:375px; margin:0 auto 12px; padding:12px 16px; background:#1f2937; color:#fff; font-size:12px; border-radius:6px; }
  .banner b { color:#fbbf24; }
</style></head>
<body>
<div class="banner"><b>WITHOUT design system</b> — 빨간 컨테이너 박스 + 빨간 타이틀 + 빨간 CTA · "에러=빨강" 과잉 / 메인 액션 모호 / 영문 혼재</div>
<div class="frame">
  <div class="topbar">
    <button class="icon-btn" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="err-wrap">
    <div class="err-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
    </div>
    <h1 class="err-title">Payment Failed</h1>
    <p class="err-desc">Please check your payment details and try again.</p>
  </div>
  <div class="info-card">
    <div class="info-row"><span class="k">Item</span><span class="v">모듈 패브릭 4인 소파 외 1건</span></div>
    <div class="info-row"><span class="k">Method</span><span class="v">신한카드 ****-1234</span></div>
    <div class="info-row"><span class="k">Amount</span><span class="v">₩1,290,000</span></div>
  </div>
  <div class="bottombar">
    <button class="btn-secondary">Cancel</button>
    <button class="btn-primary">Retry</button>
  </div>
</div>
</body></html>
