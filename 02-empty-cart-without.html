<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>WITHOUT — 빈 장바구니</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f3f4f6; color:#111827; }
  .frame { max-width:375px; margin:24px auto; background:#fff; min-height:90vh; box-shadow:0 1px 3px rgba(0,0,0,.1); position:relative; padding-bottom:80px; overflow:hidden; border-radius:8px; }
  .topbar { height:56px; display:flex; align-items:center; padding:0 16px; border-bottom:1px solid #e5e7eb; }
  .icon-btn { padding:8px; border:none; background:transparent; color:#374151; cursor:pointer; }
  .icon-btn svg { width:20px; height:20px; }
  .header-title { flex:1; text-align:center; font-size:18px; font-weight:600; }
  .empty-wrap { padding:80px 24px 32px; display:flex; flex-direction:column; align-items:center; text-align:center; }
  .illust { width:96px; height:96px; margin-bottom:24px; color:#9ca3af; }
  .illust svg { width:100%; height:100%; }
  .empty-title { font-size:20px; line-height:1.4; font-weight:700; color:#111827; margin-bottom:8px; }
  .empty-desc { font-size:14px; line-height:1.6; color:#6b7280; margin-bottom:24px; }
  .secondary { padding:24px 16px 0; }
  .section-title { font-size:14px; font-weight:600; color:#374151; margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px; }
  .reco-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .reco-card { background:#fff; border:1px solid #e5e7eb; border-radius:8px; overflow:hidden; }
  .reco-img { aspect-ratio:1/1; background:#e5e7eb; }
  .reco-body { padding:8px; }
  .reco-name { font-size:13px; color:#374151; margin-bottom:4px; }
  .reco-price { font-size:14px; font-weight:600; color:#111827; }
  .bottombar { position:absolute; bottom:0; left:0; right:0; background:#fff; padding:12px 16px; border-top:1px solid #e5e7eb; }
  .cta { width:100%; height:44px; background:#3b82f6; color:#fff; border:none; border-radius:6px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .cta:hover { background:#2563eb; }
  .banner { max-width:375px; margin:0 auto 12px; padding:12px 16px; background:#1f2937; color:#fff; font-size:12px; border-radius:6px; }
  .banner b { color:#fbbf24; }
</style></head>
<body>
<div class="banner"><b>WITHOUT design system</b> — 일반 empty state: 큰 아이콘 + 영문 mix + blue-500 CTA · 추천 상품 카드 보더 처리</div>
<div class="frame">
  <div class="topbar">
    <button class="icon-btn" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="header-title">Cart</div>
    <div style="width:36px"></div>
  </div>
  <div class="empty-wrap">
    <div class="illust">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M3 6h2l2 12h12l2-9H6"/></svg>
    </div>
    <h1 class="empty-title">Your cart is empty</h1>
    <p class="empty-desc">Add items to your cart to see them here.</p>
  </div>
  <div class="secondary">
    <div class="section-title">Recommended for you</div>
    <div class="reco-grid">
      <div class="reco-card"><div class="reco-img"></div><div class="reco-body"><div class="reco-name">Modular Sofa</div><div class="reco-price">₩1,290,000</div></div></div>
      <div class="reco-card"><div class="reco-img"></div><div class="reco-body"><div class="reco-name">Walnut Table</div><div class="reco-price">₩890,000</div></div></div>
    </div>
  </div>
  <div class="bottombar"><button class="cta">Continue Shopping</button></div>
</div>
</body></html>
